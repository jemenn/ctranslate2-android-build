name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Inspect CMakeLists
      run: |
        cd CTranslate2
        echo "=== grep kernels in CMakeLists.txt ==="
        grep -n "kernels\|CPU_ISA\|set_source_files\|configure_file\|file(WRITE\|file(GENERATE" CMakeLists.txt | head -60
        echo ""
        echo "=== all CMakeLists.txt files ==="
        find . -name "CMakeLists.txt" | xargs grep -l "kernels" 2>/dev/null
        echo ""
        echo "=== cmake folder ==="
        ls cmake/ 2>/dev/null || echo "no cmake dir"
        echo ""
        echo "=== src/cpu folder ==="
        ls src/cpu/
