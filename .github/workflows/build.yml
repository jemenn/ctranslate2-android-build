name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      [span_4](start_span)uses: actions/checkout@v4[span_4](end_span)

    - name: Setup NDK r25c
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        [span_5](start_span)add-to-path: true[span_5](end_span)

    - name: Install tools
      run: |
        [span_6](start_span)sudo apt-get update -q[span_6](end_span)
        [span_7](start_span)sudo apt-get install -y cmake ninja-build python3[span_7](end_span)

    - name: Clone CTranslate2 v2.24.0
      run: |
        [span_8](start_span)git clone https://github.com/OpenNMT/CTranslate2.git[span_8](end_span)
        cd CTranslate2
        [span_9](start_span)git checkout v2.24.0[span_9](end_span)
        [span_10](start_span)git submodule update --init --recursive[span_10](end_span)

    - name: Patch for Android
      run: |
        cd CTranslate2
        # [span_11](start_span)修复线程亲和性函数在 Android 上的兼容性[span_11](end_span)
        [span_12](start_span)python3 -c "import base64,subprocess; subprocess.run(base64.b64decode('').decode(), shell=True)"[span_12](end_span)
        # [span_13](start_span)修改 CMakeLists.txt 以支持 ARM64/NEON 编译[span_13](end_span)
        [span_14](start_span)python3 -c "import base64; exec(base64.b64decode('').decode())"[span_14](end_span)

    - name: Build arm64-v8a
      env:
        [span_15](start_span)ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}[span_15](end_span)
      run: |
        cd CTranslate2
        mkdir -p build-arm64 && cd build-arm64
        # [span_16](start_span)修正：确保 cmake 命令是一个连续的整体，移除中间的 source 标记[span_16](end_span)
        cmake .. \
          -GNinja \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused -fPIC"
        
        [span_17](start_span)ninja -j4[span_17](end_span)

    - name: Package
      run: |
        [span_18](start_span)mkdir -p output/arm64-v8a[span_18](end_span)
        [span_19](start_span)cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/[span_19](end_span)
        [span_20](start_span)echo "SUCCESS" && ls -lh output/arm64-v8a/[span_20](end_span)

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
