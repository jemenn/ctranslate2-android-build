name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK r23c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r23c
        add-to-path: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch for Android
      run: |
        cd CTranslate2

        # 补丁1：修复 pthread_setaffinity_np
        sed -i '89s/.*/      #ifndef __ANDROID__\n      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), \&cpuset);\n      #else\n      const int status = 0;\n      #endif/' src/thread_pool.cc

        # 补丁2：在 CMakeLists.txt 里强制关闭 CPU dispatch for Android
        # 找到设置 CT2_WITH_CPU_DISPATCH 的行，加 Android 判断
        sed -i 's/target_compile_definitions(ctranslate2 PRIVATE CT2_WITH_CPU_DISPATCH)/if(NOT ANDROID)\n  target_compile_definitions(ctranslate2 PRIVATE CT2_WITH_CPU_DISPATCH)\nendif()/' CMakeLists.txt

        # 补丁3：直接注释掉 primitives.cc 里的 ISA dispatch 宏，改为直接调用
        # 用最简单的方式：在 primitives.cc 里取消 CPU dispatch 宏
        sed -i 's/#define CPU_ISA_DISPATCH(\(.*\))/#ifdef __ANDROID__\n#define CPU_ISA_DISPATCH(x) x\n#else\n#define CPU_ISA_DISPATCH(\1)\n#endif/' src/cpu/cpu_info.h 2>/dev/null || true

        # 补丁4：直接在源文件头部取消 CT2_WITH_CPU_DISPATCH
        sed -i '1s/^/#ifdef __ANDROID__\n#undef CT2_WITH_CPU_DISPATCH\n#endif\n/' src/cpu/primitives.cc

        echo "=== 补丁验证 ==="
        echo "--- thread_pool.cc ---"
        sed -n '86,96p' src/thread_pool.cc
        echo "--- primitives.cc 前5行 ---"
        head -6 src/cpu/primitives.cc

    - name: Build arm64-v8a
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter" \
          -GNinja
        ninja -j4

    - name: Build armeabi-v7a
      run: |
        cd CTranslate2
        mkdir build-v7 && cd build-v7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter" \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/armeabi-v7a
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp CTranslate2/build-v7/libctranslate2.so   output/armeabi-v7a/
        echo "=== 编译结果 ==="
        ls -lh output/arm64-v8a/
        ls -lh output/armeabi-v7a/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
