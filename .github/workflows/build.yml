name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v3.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v3.24.0
        git submodule update --init --recursive

    - name: Patch for Android
      run: |
        cd CTranslate2
        python3 -c "import base64,subprocess; subprocess.run(base64.b64decode('').decode(), shell=True)"
        python3 -c "import base64; exec(base64.b64decode('').decode())"

    - name: Build arm64-v8a
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused" \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/include output/include/nlohmann output/include/half_float
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp -r CTranslate2/include/ctranslate2 output/include/
        find CTranslate2/third_party -name "json.hpp" | head -1 | xargs -I{} cp {} output/include/nlohmann/ 2>/dev/null || true
        find CTranslate2/third_party -name "half.hpp" | head -1 | xargs -I{} cp {} output/include/half_float/ 2>/dev/null || true
        echo "=== third_party dirs ===" && ls CTranslate2/third_party/
        echo "=== nlohmann ===" && find CTranslate2 -name "json.hpp" 2>/dev/null | head -5
        echo "=== half ===" && find CTranslate2 -name "half.hpp" 2>/dev/null | head -5
        echo "SUCCESS" && ls -lh output/arm64-v8a/ && ls output/include/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
