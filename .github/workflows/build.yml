name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Print key source files
      run: |
        cd CTranslate2
        echo "========== src/cpu/cpu_isa.h =========="
        cat src/cpu/cpu_isa.h
        echo ""
        echo "========== include/ctranslate2/types.h (CpuIsa enum) =========="
        grep -n "CpuIsa\|NEON\|GENERIC\|CT2_WITH" include/ctranslate2/types.h
        echo ""
        echo "========== src/cpu/primitives.cc (first 30 lines) =========="
        head -30 src/cpu/primitives.cc
        echo ""
        echo "========== CMakeLists.txt (CPU dispatch section) =========="
        grep -n "CPU_DISPATCH\|CT2_WITH_NEON\|set_source_files\|NEON\|primitives" CMakeLists.txt | head -40
        echo ""
        echo "========== src/cpu/CMakeLists.txt =========="
        cat src/cpu/CMakeLists.txt 2>/dev/null || echo "not found"
