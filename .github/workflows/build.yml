name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch all Android issues
      run: |
        cd CTranslate2
        python3 << 'PYEOF'
        import re, os

        # ── 补丁1：thread_pool.cc ────────────────────────────────────
        with open('src/thread_pool.cc') as f: c = f.read()
        c = c.replace(
            'const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);',
            '#ifndef __ANDROID__\n'
            '      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);\n'
            '      #else\n'
            '      const int status = 0;\n'
            '      #endif'
        )
        with open('src/thread_pool.cc', 'w') as f: f.write(c)
        print("✓ patch1: thread_pool.cc")

        # ── 补丁2：types.h - 直接让 NEON 永远存在于枚举 ────────────
        # 原代码：
        #   #ifdef CT2_WITH_NEON
        #   NEON,
        #   #endif
        # 修改为：NEON 无条件存在（ARM 平台 NEON 是标配）
        types_h = 'include/ctranslate2/types.h'
        with open(types_h) as f: c = f.read()
        c = c.replace(
            '#ifdef CT2_WITH_NEON\n    NEON,\n    #endif',
            'NEON,  // always defined (ARM NEON is standard)'
        )
        # 也处理没有缩进的情况
        c = c.replace(
            '#ifdef CT2_WITH_NEON\n  NEON,\n  #endif',
            'NEON,  // always defined'
        )
        c = re.sub(
            r'#ifdef CT2_WITH_NEON\s+NEON,\s+#endif',
            'NEON,  // always defined',
            c
        )
        with open(types_h, 'w') as f: f.write(c)
        print("✓ patch2: types.h NEON always defined")

        # ── 补丁3：cpu_isa.h - 确保 NEON 相关宏正确 ────────────────
        cpu_isa = 'src/cpu/cpu_isa.h'
        if os.path.exists(cpu_isa):
            with open(cpu_isa) as f: c = f.read()
            # 确保 CT2_WITH_NEON 宏在 Android 时被定义
            if '#ifdef __ANDROID__' not in c:
                c = '#ifdef __ANDROID__\n#define CT2_WITH_NEON\n#endif\n' + c
            with open(cpu_isa, 'w') as f: f.write(c)
            print("✓ patch3: cpu_isa.h")

        # ── 补丁4：CMakeLists.txt - Android 时关闭 CPU dispatch ─────
        with open('CMakeLists.txt') as f: c = f.read()
        # 用 sed 无法处理多行，用 Python 直接替换
        # 找所有设置 CT2_WITH_CPU_DISPATCH 的地方
        c = re.sub(
            r'([ \t]*target_compile_definitions\([^\)]*CT2_WITH_CPU_DISPATCH[^\)]*\))',
            r'if(NOT ANDROID)\n\1\nendif()',
            c
        )
        c = re.sub(
            r'([ \t]*set_property\([^\)]*CT2_WITH_CPU_DISPATCH[^\)]*\))',
            r'if(NOT ANDROID)\n\1\nendif()',
            c
        )
        with open('CMakeLists.txt', 'w') as f: f.write(c)
        print("✓ patch4: CMakeLists.txt")

        # ── 验证 ────────────────────────────────────────────────────
        with open('include/ctranslate2/types.h') as f: c = f.read()
        idx = c.find('NEON')
        if idx >= 0:
            print(f"✓ 验证 NEON 在 types.h: ...{c[idx-30:idx+20]}...")
        else:
            print("✗ NEON 不在 types.h！")
        PYEOF

    - name: Build arm64-v8a
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-DCT2_WITH_NEON -Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -GNinja
        ninja -j4

    - name: Build armeabi-v7a
      run: |
        cd CTranslate2
        mkdir build-v7 && cd build-v7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DANDROID_ARM_NEON=TRUE \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-DCT2_WITH_NEON -Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/armeabi-v7a
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp CTranslate2/build-v7/libctranslate2.so   output/armeabi-v7a/
        ls -lh output/arm64-v8a/ output/armeabi-v7a/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
