name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch for Android
      run: |
        cd CTranslate2

        # 补丁1：thread_pool.cc
        sed -i 's/const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), \&cpuset);/#ifndef __ANDROID__\n      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), \&cpuset);\n      #else\n      const int status = 0;\n      #endif/' src/thread_pool.cc

        # 补丁2+3：修改 CMakeLists.txt
        python3 - << 'PYEOF'
        with open('CMakeLists.txt') as f:
            content = f.read()

        # 补丁2：在 project() 后插入全局宏
        lines = content.splitlines(keepends=True)
        insert_idx = -1
        for i, line in enumerate(lines):
            if line.strip().startswith('project('):
                insert_idx = i + 1
                break
        if insert_idx >= 0:
            lines.insert(insert_idx, '\nadd_compile_definitions(CT2_ARM64_BUILD)\n')
            content = ''.join(lines)
            print(f'✓ patch2: CT2_ARM64_BUILD 插入第{insert_idx+1}行')

        # 补丁3：找 kernels_neon.cc 在 CMakeLists.txt 里
