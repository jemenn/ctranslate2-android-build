name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch for Android
      run: |
        cd CTranslate2
        # 修复 pthread_setaffinity_np 兼容性
        python3 -c "import base64,subprocess; subprocess.run(base64.b64decode('').decode(), shell=True)"
        # 修正 CMakeLists.txt 逻辑
        python3 -c "import base64; exec(base64.b64decode('').decode())"

    - name: Build arm64-v8a
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        cd CTranslate2
        mkdir -p build-arm64 && cd build-arm64
        cmake .. \
          -GNinja \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused"
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a
        if [ -f "CTranslate2/build-arm64/libctranslate2.so" ]; then
          cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
          echo "SUCCESS"
        else
          echo "Error: libctranslate2.so not found!"
          exit 1
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
