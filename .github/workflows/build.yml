name: Convert Model to CT2

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Install ctranslate2
      run: pip install ctranslate2 sentencepiece

    - name: Download model from HuggingFace
      run: |
        pip install huggingface_hub
        python3 -c "
import os
os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
from huggingface_hub import snapshot_download
snapshot_download('Helsinki-NLP/opus-mt-en-zh', local_dir='opus-mt-en-zh')
print('下载完成')
import os
for f in os.listdir('opus-mt-en-zh'):
    print(f)
"

    - name: Convert to CTranslate2 format
      run: |
        ct2-opus-mt-converter \
          --model_dir opus-mt-en-zh \
          --output_dir opus-mt-en-zh-ct2 \
          --quantization int8
        echo "转换完成"
        ls -lh opus-mt-en-zh-ct2/

    - name: Upload CT2 model
      uses: actions/upload-artifact@v4
      with:
        name: opus-mt-en-zh-ct2
        path: opus-mt-en-zh-ct2/
        retention-days: 7
