name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch for Android
      run: |
        cd CTranslate2
        sed -i 's/const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), \&cpuset);/#ifndef __ANDROID__\n      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), \&cpuset);\n      #else\n      const int status = 0;\n      #endif/' src/thread_pool.cc
        python3 -c "import base64; exec(base64.b64decode('').decode())"
        grep -n "kernels_neon\|CT2_ARM64_BUILD\|project(" CMakeLists.txt | head -10

    - name: Build arm64-v8a
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused" \
          -GNinja
        ninja -j4

    - name: Build armeabi-v7a
      run: |
        cd CTranslate2
        mkdir build-v7 && cd build-v7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DANDROID_ARM_NEON=TRUE \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused" \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/armeabi-v7a
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp CTranslate2/build-v7/libctranslate2.so   output/armeabi-v7a/
        echo "OK" && ls -lh output/arm64-v8a/ output/armeabi-v7a/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
