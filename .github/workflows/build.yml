name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Patch all Android issues
      run: |
        cd CTranslate2
        python3 << 'PYEOF'
        import re

        # ── 补丁1：thread_pool.cc - pthread_setaffinity_np ──────────
        with open('src/thread_pool.cc') as f: c = f.read()
        c = c.replace(
            'const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);',
            '#ifndef __ANDROID__\n'
            '      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);\n'
            '      #else\n'
            '      const int status = 0;\n'
            '      #endif'
        )
        with open('src/thread_pool.cc', 'w') as f: f.write(c)
        print("✓ patch1: thread_pool.cc")

        # ── 补丁2：CMakeLists.txt - Android 时禁用 CPU dispatch ─────
        # 根本原因：primitives.cc 被 CPU dispatch 编译时缺少 -DCPU_ISA 宏
        # 最干净的解法：Android 上彻底关闭 CPU dispatch
        # 在 CMakeLists.txt 里找到开启 CPU dispatch 的位置，加 Android 判断
        with open('CMakeLists.txt') as f: c = f.read()

        # 找 CT2_WITH_CPU_DISPATCH 被设置的地方，加 NOT ANDROID 判断
        # 通常是 target_compile_definitions 或 set(CT2_WITH_CPU_DISPATCH ...)
        c = re.sub(
            r'(target_compile_definitions\(ctranslate2[^)]*CT2_WITH_CPU_DISPATCH[^)]*\))',
            r'if(NOT ANDROID)\n  \1\nendif()',
            c
        )
        # 也处理 add_compile_definitions 形式
        c = re.sub(
            r'(add_compile_definitions\([^)]*CT2_WITH_CPU_DISPATCH[^)]*\))',
            r'if(NOT ANDROID)\n  \1\nendif()',
            c
        )
        with open('CMakeLists.txt', 'w') as f: f.write(c)
        print("✓ patch2: CMakeLists.txt CPU dispatch")

        # ── 补丁3：cpu/CMakeLists.txt - 同样处理 ────────────────────
        import os
        cpu_cmake = 'src/cpu/CMakeLists.txt'
        if os.path.exists(cpu_cmake):
            with open(cpu_cmake) as f: c = f.read()
            c = re.sub(
                r'(.*CT2_WITH_CPU_DISPATCH.*)',
                r'if(NOT ANDROID)\n  \1\nendif()',
                c
            )
            with open(cpu_cmake, 'w') as f: f.write(c)
            print("✓ patch3: cpu/CMakeLists.txt")

        # ── 补丁4：primitives.cc 加文件头保护（兜底）──────────────
        with open('src/cpu/primitives.cc') as f: c = f.read()
        guard = (
            '#ifdef __ANDROID__\n'
            '#undef CT2_WITH_CPU_DISPATCH\n'
            '#endif\n'
        )
        if '#undef CT2_WITH_CPU_DISPATCH' not in c:
            c = guard + c
            with open('src/cpu/primitives.cc', 'w') as f: f.write(c)
            print("✓ patch4: primitives.cc header guard")

        # ── 验证 ────────────────────────────────────────────────────
        print("\n=== 验证补丁 ===")
        with open('src/thread_pool.cc') as f: lines = f.readlines()
        for i,l in enumerate(lines[85:95], 86): print(f"  thread_pool:{i} {l.rstrip()}")
        with open('src/cpu/primitives.cc') as f: lines = f.readlines()
        for i,l in enumerate(lines[:5], 1): print(f"  primitives:{i} {l.rstrip()}")
        PYEOF

    - name: Build arm64-v8a
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -GNinja
        ninja -j4

    - name: Build armeabi-v7a
      run: |
        cd CTranslate2
        mkdir build-v7 && cd build-v7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DANDROID_ARM_NEON=TRUE \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/armeabi-v7a
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp CTranslate2/build-v7/libctranslate2.so   output/armeabi-v7a/
        ls -lh output/arm64-v8a/ output/armeabi-v7a/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
