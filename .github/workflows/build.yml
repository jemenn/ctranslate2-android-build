name: Build CTranslate2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install tools
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake ninja-build python3

    - name: Clone CTranslate2 v2.24.0
      run: |
        git clone https://github.com/OpenNMT/CTranslate2.git
        cd CTranslate2
        git checkout v2.24.0
        git submodule update --init --recursive

    - name: Auto-patch all Android incompatibilities
      run: |
        cd CTranslate2
        python3 << 'PYEOF'
        import re, os, glob

        def patch_file(path, patches):
            with open(path) as f:
                c = f.read()
            orig = c
            for old, new in patches:
                c = c.replace(old, new)
            if c != orig:
                with open(path, 'w') as f:
                    f.write(c)
                print(f"  ✓ patched {path}")
            else:
                print(f"  - unchanged {path}")

        # 补丁1：thread_pool.cc - pthread_setaffinity_np
        patch_file('src/thread_pool.cc', [(
            'const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);',
            '#ifndef __ANDROID__\n      const int status = pthread_setaffinity_np(thread.native_handle(), sizeof (cpu_set_t), &cpuset);\n      #else\n      const int status = 0;\n      #endif'
        )])

        # 补丁2：primitives.cc - 文件头加 undef 保护（备用）
        path2 = 'src/cpu/primitives.cc'
        with open(path2) as f: c = f.read()
        guard = '// Android compatibility guard\n#ifdef __ANDROID__\n#ifndef CT2_WITH_NEON\n#define CT2_WITH_NEON\n#endif\n#endif\n'
        if '// Android compatibility guard' not in c:
            with open(path2, 'w') as f:
                f.write(guard + c)
            print(f"  ✓ patched {path2}")

        # 补丁3：扫描所有 .cc/.h 找 Android 不支持的 API
        bad_apis = ['pthread_setaffinity_np', 'pthread_getaffinity_np']
        for fpath in glob.glob('src/**/*.cc', recursive=True) + glob.glob('src/**/*.h', recursive=True):
            with open(fpath) as f:
                c = f.read()
            for api in bad_apis:
                if api in c and '#ifndef __ANDROID__' not in c:
                    print(f"  ⚠️  {fpath} 含有 {api}，需要额外 patch")

        print("补丁完成")
        PYEOF

    - name: Build arm64-v8a
      run: |
        cd CTranslate2
        mkdir build-arm64 && cd build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -DCMAKE_CXX_STANDARD=17 \
          -GNinja
        ninja -j4 2>&1 | tee build.log
        if grep -q "error:" build.log; then
          echo "=== 编译错误 ===" && grep "error:" build.log | head -20
          exit 1
        fi

    - name: Build armeabi-v7a
      run: |
        cd CTranslate2
        mkdir build-v7 && cd build-v7
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DWITH_TESTS=OFF \
          -DWITH_BENCHMARKS=OFF \
          -DWITH_MKL=OFF \
          -DWITH_DNNL=OFF \
          -DWITH_ACCELERATE=OFF \
          -DWITH_OPENBLAS=OFF \
          -DOPENMP_RUNTIME=NONE \
          -DWITH_NEON=ON \
          -DANDROID_ARM_NEON=TRUE \
          -DCMAKE_CXX_FLAGS="-Wno-deprecated -Wno-error -Wno-unused-parameter -Wno-unused-variable" \
          -DCMAKE_CXX_STANDARD=17 \
          -GNinja
        ninja -j4

    - name: Package
      run: |
        mkdir -p output/arm64-v8a output/armeabi-v7a
        cp CTranslate2/build-arm64/libctranslate2.so output/arm64-v8a/
        cp CTranslate2/build-v7/libctranslate2.so   output/armeabi-v7a/
        echo "=== 成功 ===" && ls -lh output/arm64-v8a/ output/armeabi-v7a/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ctranslate2-android-libs
        path: output/
        retention-days: 30
